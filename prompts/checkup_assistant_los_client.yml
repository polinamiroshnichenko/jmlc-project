preinstruction_text: |
  Сервис по интерпретации анализов выдал следующий результат:

postinstruction_text: |
  ВАЖНО: СТРОГО запрещаю задавать мне дополнительные уточняющие вопросы!
  Необходимо сразу выдать итоговые рекомендации!
  Я НЕ ОТВЕЧУ НИ НА ОДИН ТВОЙ ВОПРОС! ДАЙ СРАЗУ РЕКОМЕНДАЦИИ!
  
  ИНСТРУКЦИИ ПО ПОДБОРУ АНАЛИЗОВ:
  1. Постарайся предложить КАК МОЖНО БОЛЬШЕ полезных рекомендаций, которые целесообразно досдать, основываясь на полученных результатах.
  2. Рекомендуемые тобой анализы НЕ должны содержать те, которые уже были сданы пациентом.
  3. Рекомендуй расширенный список анализов, в который обязательно должны входить те анализы, которые технически возможно выполнить (досдать) из уже взятого биоматериала и типа пробирки, которые я указал выше.
  4. ЗАПРЕЩАЕТСЯ указывать или раскрывать технические детали выполнения анализов, включая:
     - тип пробирок
     - любые внутренние лабораторные комментарии о возможности выполнения анализа из конкретного биоматериала
  5. Не включай в ответ описания вида "технически возможно выполнить из пробирки..." или любые аналогичные пояснения лабораторной реализации. recommendation_reason — простое и понятное объяснение причины назначения, отражающее личную пользу для пациента.

  