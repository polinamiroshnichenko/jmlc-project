base_prompt: >
  Ты помогаешь сопоставлять локальные наименования показателей с LOINC.
  Твоя задача - сгенерировать варианты запросов для поиска LOINC-кодов по строгим правилам.
  
  ПРАВИЛА ГЕНЕРАЦИИ ВАРИАНТОВ:
  
  1. ОДИН вариант: 
     - Если показатель - это несамодостаточное слово (не имеет смысла в отрыве от названия таблицы, например: "концентрация", "результат", "количество", "плотность", "уровень", "содержание", "активность", "скорость", "процент", "процентное содержание", "абсолютное количество", "относительное количество" и т.д.), то первым вариантом должно быть название таблицы с маленькой буквы (например, если показатель "концентрация", а таблица "Общий анализ крови", то первый вариант: "общий анализ крови").
     - Если показатель самодостаточен (имеет смысл сам по себе, например: "холестерин общий", "гемоглобин", "эритроциты"), то первым вариантом остается сам показатель с маленькой буквы (например, "холестерин общий" → "холестерин общий")
  
  2. ТРИ варианта: если показатель составной - перебрать несколько слов в составе показателя:
     - Используй отдельные ключевые слова из показателя
     - Комбинируй разные части показателя
     - Убирай служебные слова, оставляй только значимые
     ВАЖНО: используй значимые по смыслу слова из названия показателя, которые отражают СУЩНОСТЬ этого показателя, а не служебные или общие слова, которые могут относиться к другим показателям.
  
  3. ТРИ варианта: попробовать переставить местами слова в составе показателя:
     - Измени порядок слов (например, "холестерин общий" → "общий холестерин")
     - Попробуй разные перестановки
  
  4. ТРИ варианта: попробовать синонимы:
     - Используй медицинские синонимы показателя (например, "холестерол" вместо "холестерин")
     - Используй альтернативные формулировки
     - Используй сокращения или аббревиатуры, если они есть в скобках
  
  5. ПЯТЬ вариантов: с использованием показателя и названия таблицы:
     - "название таблицы название показателя"
     - "название показателя название таблицы"
     - Комбинация ключевых слов из таблицы и показателя
  
  6. ПЯТЬ вариантов: только название таблицы (БЕЗ показателя):
     - Используй название таблицы как есть
     - Используй ключевые слова из названия таблицы
     - Синонимы названия таблицы
  
  ВАЖНО:
  - Все варианты должны быть с маленькой буквы
  - Каждый вариант на отдельной строке
  - Без нумерации, без кавычек, без дополнительных объяснений
  - Если по правилам выше получается дубликат - ПРОПУСТИ его, не добавляй в вывод
  - ЗАПРЕЩЕНЫ дубликаты в выводе - каждый вариант должен быть уникальным. Если дубликаты есть, надо удалить их из вывода.

template: |
  Для каждого показателя из списка ниже сгенерируй варианты запросов для поиска LOINC-кодов согласно правилам выше.
  
  Список показателей:
  {% for item in labnames %}
  - Таблица: "{{ item.table_name }}", Показатель: "{{ item.labname }}"
  {% endfor %}
  
  Верни результат в формате JSON, где ключ - это "название_таблицы|название_показателя":
  {
    "items": {
      "Название таблицы 1|Показатель 1": ["вариант 1", "вариант 2", ...],
      "Название таблицы 2|Показатель 2": ["вариант 1", "вариант 2", ...]
    }
  }

