preinstruction_text: |
  Сервис по интерпретации анализов выдал следующий результат:

postinstruction_text: |
  ВАЖНО: СТРОГО запрещаю задавать мне дополнительные уточняющие вопросы!
  Необходимо сразу выдать итоговые рекомендации!
  Я НЕ ОТЧЕЧУ НИ НА ОДИН ТВОЙ ВОПРОС! ДАЙ СРАЗУ РЕКОМЕНДАЦИИ!
  Рекомендуемые тобой анализы не должны содержать те, которые уже были сданы пациентом.

